<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#f9f4ff,#ffe8f2);
    font-family:Arial,Helvetica,sans-serif;
}

.profile-card{
    width:420px;
    margin:50px auto;
    background:white;
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.profile-img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:5px solid #ff69b4;
}

.title{
    color:#d63384;
    font-weight:bold;
    margin-top:20px;
}

.info{
    margin-top:25px;
    text-align:left;
    font-size:18px;
}

.info p{
    border-bottom:1px solid #eee;
    padding:12px;
}

.btn-custom{
    width:100%;
    margin-top:15px;
    border-radius:30px;
}

</style>

</head>

<body>

<div class="profile-card">

<img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png"
class="profile-img">

<h2 class="title">My Profile</h2>

<div class="info">

<p><b>👤 Name :</b> {{ session['user'] }}</p>

<p><b>📧 Email :</b> {{ session['user'] }}</p>

<p><b>🚌 Status :</b> Active Member</p>

</div>

<a href="/dashboard" class="btn btn-primary btn-custom">
🏠 Dashboard
</a>

<a href="/history" class="btn btn-success btn-custom">
📜 Pass History
</a>

<a href="/logout" class="btn btn-danger btn-custom">
🚪 Logout
</a>

</div>

</body>
</html>
