<!DOCTYPE html>
<html>
<head>
<title>Digital Bus Pass</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

<div class="card shadow p-5 mx-auto text-center" style="max-width:600px">

<h1>🚌 Digital Bus Pass</h1>

<hr>

<h3>Name : {{ name }}</h3>

<h3>Source : {{ source }}</h3>

<h3>Destination : {{ destination }}</h3>

<h3>Duration : {{ duration }}</h3>
<h3>Fare : ₹{{ fare }}</h3>
<h3>Pass ID : {{ pass_id }}</h3>

<h2 class="text-success">
    ACTIVE
</h2>
<hr>

<h3>QR Code</h3>

<img src="{{ url_for('static', filename=qr_image) }}"
     alt="QR Code"
     width="200">

<br><br>

<a href="{{ url_for('history') }}" class="btn btn-primary">
    View Booking History
</a>



<h2 class="text-success">
ACTIVE
</h2>

</div>

</div>

</body>
</html>
